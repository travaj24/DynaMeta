name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 pulls numpy 2.x (no numpy<2 wheels for 3.13) -> the numpy-2.x compatibility leg, so a
        # re-introduced removed API (np.trapz, np.float_, ...) fails CI instead of passing on a 1.24 resolve.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install core + dev + plot (matplotlib) and h5py directly so the results/IO/viz/
      # cache layer is exercised on every Python. NOTE: the `io` extra pins zarr>=3.0,
      # which requires Python >=3.11 -- installing it would break the py3.10 leg, so we
      # install h5py here (wheels on all CI Pythons) and let the IDENTICAL zarr code path
      # be covered locally on 3.11+; the io tests pick whichever backend is installed and
      # skip the rest. The heavy solver stack (devsim/ngsolve/gmsh) is NOT exercised here.
      - name: Install (core + dev + plot + h5py)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plot]" "h5py>=3.8" "zarr>=3; python_version >= '3.11'"
      - name: Run fast tests
        # audit S6-3: the 7 @slow validation-wrapper tests (~35 CPU-min across the matrix) are
        # excluded here; their underlying validation modules run once in the py3.13 smoke tier.
        run: pytest tests/ -q -m "not slow"
      # audit 1.2/6.3: the smoke validation tier was advertised 'CI-able' but never
      # wired in -- its physics oracles gated nothing automatically. One leg (the
      # numpy-2.x python) runs the curated pure-numpy tier; capability-skips exit 42
      # and are counted separately (never green-washed as PASS).
      - name: Run smoke validation tier
        if: matrix.python-version == '3.13'
        run: python -m validation.run_all --tier smoke
