name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install only the light core + dev deps (numpy/scipy/pytest/tmm). The heavy
      # solver stack (devsim/ngsolve/gmsh) is the optional `solvers` extra and is
      # NOT exercised here -- the fast tests cover the pure-numpy data model +
      # bridge + DielectricDB. The FEM/DEVSIM checks live in validation/ and are
      # run manually where those solvers are available.
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fast tests
        run: pytest tests/ -q
