name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install core + dev + plot (matplotlib) and h5py directly so the results/IO/viz/
      # cache layer is exercised on every Python. NOTE: the `io` extra pins zarr>=3.0,
      # which requires Python >=3.11 -- installing it would break the py3.10 leg, so we
      # install h5py here (wheels on all CI Pythons) and let the IDENTICAL zarr code path
      # be covered locally on 3.11+; the io tests pick whichever backend is installed and
      # skip the rest. The heavy solver stack (devsim/ngsolve/gmsh) is NOT exercised here.
      - name: Install (core + dev + plot + h5py)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plot]" "h5py>=3.8"
      - name: Run fast tests
        run: pytest tests/ -q
