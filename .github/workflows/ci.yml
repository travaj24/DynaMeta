name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install the light core + dev + the io/plot extras (h5py/zarr/matplotlib are
      # pure-python or wheels -- no system libs needed) so the results/IO/viz/cache
      # layer is exercised. The heavy solver stack (devsim/ngsolve/gmsh) is the
      # optional `solvers` extra and is NOT exercised here -- the fast tests cover the
      # pure-numpy data model + bridge + DielectricDB + the serialization layer. The
      # FEM/DEVSIM checks live in validation/ and run where those solvers are available.
      - name: Install (core + dev + io + plot)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,io,plot]"
      - name: Run fast tests
        run: pytest tests/ -q
